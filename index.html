<!DOCTYPE html>
<html lang="pt BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>


        <div class="logo-container"></div>


        <div class="btn_voltar">
            <button>
                <img src="assets/img/arrowback_111142.svg" alt="ícone de seta">
                <span>Voltar</span>
            </button>
        </div>

        <div class="lista-container">
            <h1>
                Compras da semana
            </h1>

            <form>
                <label for="lista-input"></label>
                <input type="text" id="lista-input">

                <button type="submit">Adicionar item</button>
            </form>

            <div class="item-container">
                <button type="radio"></button>
                <p>Pão de forma</p>
                <button>
                    <img src="assets/img/Frame-3.svg" alt="ícone de lixeira">
                </button>
            </div>

            <div class="alert-remove">
                <img src="assets/img/warning-circle-filled.svg" alt="ícone de alerta">
                <p>O item foi removido da lista</p>
                <img src="assets/img/delete-small.svg" alt="ícone de x">
            </div>
        </div>
    </main>
</body>
</html>
