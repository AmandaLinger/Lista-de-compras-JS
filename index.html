<!DOCTYPE html>
<html lang="pt BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>


        <div class="logo-container">
            <div class="logo"></div>
        </div>


        <div class="btn_voltar">
            <button class="voltar">
                <img src="assets/img/arrowback_111142.svg" alt="ícone de seta" id="icon_seta">
                <div class="voltar">Voltar</div>
            </button>
        </div>

        <div class="lista-container">
            <h1>
                Compras da semana
            </h1>

            <form>
                <label for="lista-input"></label>
                <input type="text" id="lista-input" placeholder="Adicione um novo item">

                <button class="adicionar" type="submit">Adicionar item</button>
            </form>

            <div class="item-container displayNone">
                <div class="space-container">
                    <button type="radio" class="radio"></button>
                    <p class="name-item">Pão de forma</p>
                </div>
                <div>
                    <button class="btn_lixeira">
                        <img src="assets/img/Frame-3.svg" alt="ícone de lixeira">
                    </button>
                </div>
            </div>

        </div>
    </main>
            

            <div class="alert-remove">
                <div class="space-container">
                    <img src="assets/img/warning-circle-filled.svg" alt="ícone de alerta">
                    <p class="p-alert">O item foi removido da lista</p>
                </div>
                <div>
                    <img src="assets/img/delete-small.svg" alt="ícone de x" >
                </div>
            </div>
    <script src="index.js"></script>
</body>
</html>
